name: rust-tests

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: rust-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup rust
        run: rustup update stable

      - name: run tests
        run: cargo test --all-targets --all-features
